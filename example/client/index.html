<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #333; color: #eee; height: 100vh; display: flex; flex-direction: column; }
        #connect-dialog { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; }
        #connect-dialog.hidden { display: none; }
        .dialog-content { background: #444; padding: 2rem; border-radius: 8px; width: 360px; }
        .dialog-content h2 { margin-bottom: 1.5rem; text-align: center; }
        .form-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .form-row .form-group { margin-bottom: 0; flex: 1; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #bbb; }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid #555; border-radius: 4px; background: #2a2a2a; color: #fff; font-size: 1rem; }
        .form-group input:focus { outline: none; border-color: #4a9eff; }
        #connect-btn { width: 100%; padding: 0.75rem; background: #4a9eff; border: none; border-radius: 4px; color: #fff; font-size: 1rem; cursor: pointer; }
        #connect-btn:hover { background: #3a8eef; }
        #chat-container { flex: 1; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; width: 100%; padding: 1rem; }
        #status { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.5rem; font-size: 0.85rem; color: #888; margin-bottom: 0.5rem; }
        #status::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #f44336; }
        #status.connected { color: #4caf50; }
        #status.connected::before { background: #4caf50; }
        #status.disconnected { color: #f44336; }
        #status.disconnected::before { background: #f44336; }
        #status.connecting { color: #ffa500; }
        #status.connecting::before { background: #ffa500; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        #messages { flex: 1; overflow-y: auto; padding: 1rem; background: #444; border-radius: 8px; margin-bottom: 1rem; }
        .message { padding: 0.5rem 0; border-bottom: 1px solid #333; }
        .message:last-child { border-bottom: none; }
        .message-content { font-size: 0.9rem; color: #ddd; word-wrap: break-word; }
        .message-time { color: #888; }
        .message-username { font-weight: bold; color: #4a9eff; }
        #input-form { display: flex; gap: 0.5rem; }
        #message-input { flex: 1; padding: 0.75rem; border: 1px solid #555; border-radius: 4px; background: #2a2a2a; color: #fff; font-size: 1rem; }
        #message-input:focus { outline: none; border-color: #4a9eff; }
        #send-btn { padding: 0.75rem 1.5rem; background: #4a9eff; border: none; border-radius: 4px; color: #fff; cursor: pointer; }
        #send-btn:hover { background: #3a8eef; }
        .input-error { border-color: #f44336 !important; }
        .error-text { color: #f44336; font-size: 0.8rem; margin-top: 0.25rem; display: none; }
        .error-text.visible { display: block; }
    </style>
</head>
<body>
    <div id="connect-dialog">
        <div class="dialog-content">
            <h2>JOIN THE CHAT</h2>
            <div class="form-row">
                <div class="form-group" style="flex: 2;">
                    <label for="ip-input">IPv4 Address</label>
                    <input id="ip-input" placeholder="127.0.0.1" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="port-input">Port</label>
                    <input type="text" id="port-input" value="7815" placeholder="7815" autocomplete="off">
                </div>
            </div>
            <div class="form-group">
                <label for="username-input">Username</label>
                <input type="text" id="username-input" placeholder="Enter your name" autocomplete="off">
            </div>
            <button id="connect-btn">Connect</button>
        </div>
    </div>

    <div id="chat-container">
        <div id="status">Disconnected</div>
        <div id="messages"></div>
        <form id="input-form">
            <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" disabled>
            <button type="submit" id="send-btn" disabled>Send</button>
        </form>
    </div>

    <script>
        let eventSource = null;
        let serverAddress = '';
        let username = '';

        const dialog = document.getElementById('connect-dialog');
        const messagesDiv = document.getElementById('messages');
        const statusDiv = document.getElementById('status');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const form = document.getElementById('input-form');

        document.getElementById('connect-btn').addEventListener('click', connect);
        document.getElementById('ip-input').addEventListener('input', () => setFieldError('ip-input', false));
        document.getElementById('ip-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('port-input').focus(); });
        document.getElementById('port-input').addEventListener('input', () => setFieldError('port-input', false));
        document.getElementById('port-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('username-input').focus(); });
        document.getElementById('username-input').addEventListener('input', () => setFieldError('username-input', false));
        document.getElementById('username-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') connect(); });

        function setFieldError(fieldId, show) {
            const field = document.getElementById(fieldId);
            field.classList.toggle('input-error', show);
        }

        function validateIP(ip) {
            if (!ip) return false;
            if (ip === 'localhost') return true;
            const parts = ip.split('.');
            if (parts.length !== 4) return false;
            return parts.every(part => {
                const num = parseInt(part, 10);
                return !isNaN(num) && num >= 0 && num <= 255 && part === String(num);
            });
        }

        function validatePort(port) {
            if (!port) return false;
            const num = parseInt(port, 10);
            return !isNaN(num) && num > 0 && num <= 65535 && port === String(num);
        }

        function connect() {
            const ipInput = document.getElementById('ip-input');
            const portInput = document.getElementById('port-input');
            const usernameInput = document.getElementById('username-input');
            
            const ip = ipInput.value.trim();
            const port = portInput.value.trim();
            username = usernameInput.value.trim();

            let valid = true;

            if (!validateIP(ip)) {
                setFieldError('ip-input', true);
                valid = false;
            } else {
                setFieldError('ip-input', false);
            }

            if (!validatePort(port)) {
                setFieldError('port-input', true);
                valid = false;
            } else {
                setFieldError('port-input', false);
            }

            if (!username) {
                setFieldError('username-input', true);
                valid = false;
            } else {
                setFieldError('username-input', false);
            }

            if (!valid) return;

            serverAddress = ip + ':' + port;

            dialog.classList.add('hidden');
            subscribe();
        }

        function subscribe() {
            if (eventSource) {
                eventSource.close();
            }

            statusDiv.textContent = 'Connecting...';
            statusDiv.className = 'connecting';

            eventSource = new EventSource('http://' + serverAddress + '/subscribe');

            let connected = false;

            function setConnected() {
                if (!connected) {
                    connected = true;
                    statusDiv.textContent = 'Connected';
                    statusDiv.className = 'connected';
                    messageInput.disabled = false;
                    sendBtn.disabled = false;
                    messageInput.focus();
                }
            }

            eventSource.onopen = () => {
                setConnected();
            };

            eventSource.onmessage = (e) => {
                setConnected();
                try {
                    const msg = JSON.parse(e.data);
                    if (msg.type !== 'connected') {
                        addMessage(msg);
                    }
                } catch (err) {
                    console.error('Failed to parse message:', err);
                }
            };

            eventSource.onerror = () => {
                statusDiv.textContent = 'Disconnected';
                statusDiv.className = 'disconnected';
                messageInput.disabled = true;
                sendBtn.disabled = true;
                setTimeout(() => {
                    statusDiv.textContent = 'Reconnecting...';
                    subscribe();
                }, 3000);
            };
        }

        function addMessage(msg) {
            const time = msg.timestamp ? msg.timestamp.split('T')[1].slice(0, 8) : '';
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<span class="message-content"><span class="message-time">[${time}]</span> <span class="message-username">${escapeHtml(msg.username)}:</span> ${escapeHtml(msg.text)}</span>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHtml(s) {
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text) return;

            messageInput.value = '';

            try {
                const response = await fetch('http://' + serverAddress + '/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, text })
                });

                if (!response.ok) {
                    console.error('Failed to send message');
                }
            } catch (err) {
                console.error('Error sending message:', err);
            }
        });
    </script>
</body>
</html>
